workflows:
  ios-build:
    name: DoAble India iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "DoAble Apple Key"
    environment:
      vars:
        BUNDLE_ID: "com.doableindia"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.14.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets with Vite
        script: |
          npm run build
      - name: Sync Capacitor with iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          
          echo "🔍 DIAGNOSTICS: Listing Keychain Identities"
          security find-identity -v -p codesigning
          
          echo "🔍 DIAGNOSTICS: Checking Profiles Directory"
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          
          # Try to find profiles in the current directory (uploaded via UI)
          find . -name "*.mobileprovision" -exec cp {} "$PROFILES_HOME" \;
          
          ls -la "$PROFILES_HOME" || echo "⚠️ Profiles directory is empty!"
          
          # Force mapping
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS app
        script: |
          # Use explicit xcodebuild command with environment variables to force signing
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO | xcbeautify
          
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
