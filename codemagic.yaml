workflows:
  ios-build:
    name: DoAble India iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.doableindia"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets with Vite
        script: |
          npm run build
          ls -la dist
      - name: Sync Capacitor with iOS
        script: |
          # Build check
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not found! Creating fallback..."
            mkdir -p dist && touch dist/index.html
          fi
          
          # Sync with fallback
          npx cap sync ios || (echo "⚠️ Sync failed, attempting to re-add platform..." && npx cap add ios && npx cap sync ios)
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build unsigned iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
