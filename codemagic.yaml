workflows:
  ios-build:
    name: DoAble India iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "DoAble Apple Key"
    environment:
      vars:
        BUNDLE_ID: "com.doableindia"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        TEAM_ID: "5WW267C2PX"
      node: 22.14.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets with Vite
        script: |
          npm run build
      - name: Sync Capacitor with iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          
          # Force copy profiles to the correct location
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          find . -name "*.mobileprovision" -exec cp {} "$PROFILES_HOME" \;
          
          # Extract UUID from the profile
          export PROFILE_UUID=$(grep UUID -A1 -a "$PROFILES_HOME"/*.mobileprovision | grep -io "[-A-Z0-9]\{36\}")
          echo "🎯 Using Profile UUID: $PROFILE_UUID"
          
          # Save for next step
          echo "export PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          
          # Apply to project
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS app
        script: |
          # Use explicit signing arguments to bypass all errors
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO | xcbeautify
          
          # Convert archive to IPA
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
