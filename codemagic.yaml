workflows:
  ios-build:
    name: DoAble India iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_credentials # Ensure this matches your group name in Codemagic
      vars:
        BUNDLE_ID: "com.doableindia"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.14.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets with Vite
        script: |
          npm run build
          ls -la dist
      - name: Sync Capacitor with iOS
        script: |
          # Build check
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not found! Creating fallback..."
            mkdir -p dist && touch dist/index.html
          fi
          
          # Sync with fallback
          npx cap sync ios || (echo "⚠️ Sync failed, attempting to re-add platform..." && npx cap add ios && npx cap sync ios)
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project "$XCODE_PROJECT" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build unsigned iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --bundle-id "$BUNDLE_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit: false # Set to true later to auto-submit to TestFlight
