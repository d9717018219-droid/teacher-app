build_numbering:
  next: 382

workflows:
  ios-build:
    name: DoAble India iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "DoAble Apple Key"
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.doableindia
      vars:
        BUNDLE_ID: "com.doableindia"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.14.0
      xcode: latest
    scripts:
      - name: Build web assets and sync
        script: |
          npm install --legacy-peer-deps
          npm run build
          npx cap sync ios
      - name: Setup Firebase iOS (Optional)
        script: |
          # If GOOGLE_SERVICE_INFO is set in environment, write it to the file
          if [ ! -z "$GOOGLE_SERVICE_INFO" ]; then
            echo "$GOOGLE_SERVICE_INFO" > ios/App/App/GoogleService-Info.plist
          fi
      - name: Code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - d9717018219@gmail.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
